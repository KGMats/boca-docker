services:

    boca-web:
        image: boca-web:latest
        build: 
            context: .
            dockerfile: docker/dev/Dockerfile
            target: web
        environment:
            - BOCA_DB_SUPER_PASSWORD=superpass
        depends_on:
            boca-db:
                condition: service_healthy

    boca-jail:
        image: boca-jail:latest
        build: 
            context: .
            dockerfile: docker/dev/Dockerfile
            target: jail
        privileged: true
        environment:
            - BOCA_DB_SUPER_PASSWORD=superpass
        depends_on:
            boca-db:
                condition: service_healthy

    boca-db:
        image: postgres:14-alpine
        environment:
            - POSTGRES_PASSWORD=superpass
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 5
        volumes: 
            - db-data:/var/lib/postgresql/data

    boca-adminer:
        image: adminer:latest
        environment:
            - ADMINER_DEFAULT_SERVER=boca-db
        ports:
            - 8080:8080

volumes:
    db-data:
